spring:
  application:
    name: backend
  profiles:
    active: mysql   # 👉 change to 'h2' if needed

# ======================
# SERVER CONFIG
# ======================
server:
  port: 8081
  servlet:
    context-path: /api

# ======================
# MYSQL PROFILE
# ======================
---
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/mihiru?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # safer than create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# ======================
# H2 PROFILE
# ======================
---
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

# ======================
# APP CUSTOM CONFIG
# ======================
app:
  frontend-url: http://localhost:5173

  jwt:
    secret: test-secret-key-for-jwt-authentication-1234567890
    expiration-ms: 86400000

  admin:
    name: System Admin
    email: admin@campushub.com
    password: Admin@123

  google:
    client-id: test-google-client-id

  mail:
    from: test@campushub.com